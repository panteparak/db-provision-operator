name: Release

on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 0.5.0). Leave empty to auto-compute from conventional commits.'
        required: false
        default: ''
        type: string

permissions: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ============================================================================
  # Guard: Verify CI passed and extract release metadata
  # ============================================================================

  guard:
    name: Guard
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    outputs:
      should-release: ${{ steps.final-version.outputs.should-release }}
      version: ${{ steps.final-version.outputs.version }}
      tag: ${{ steps.final-version.outputs.tag }}
      checkout-ref: ${{ steps.final-version.outputs.checkout-ref }}
      image-tag: ${{ steps.image-tag.outputs.image-tag }}
      ci-run-id: ${{ steps.ci-run.outputs.run-id }}
    steps:
      # --- push (tag): extract version from GITHUB_REF_NAME, poll for CI ---
      - name: Extract version from tag
        if: github.event_name == 'push'
        id: version
        env:
          TAG: ${{ github.ref_name }}
        run: |
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "::error::Tag '$TAG' does not match semver pattern"
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "should-release=true" >> $GITHUB_OUTPUT
          echo "Release: $TAG (version $VERSION)"

      - name: Wait for CI to complete
        if: github.event_name == 'push'
        id: ci-poll
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_SHA: ${{ github.sha }}
          GH_REPO: ${{ github.repository }}
        run: |
          echo "Polling CI status for commit $COMMIT_SHA (up to 30 minutes)..."
          MAX_ATTEMPTS=60
          SLEEP_SECONDS=30
          for (( i=1; i<=MAX_ATTEMPTS; i++ )); do
            # Find CI workflow runs for this exact commit
            RUN_JSON=$(gh run list \
              --repo "$GH_REPO" \
              --workflow "CI" \
              --commit "$COMMIT_SHA" \
              --json databaseId,status,conclusion \
              --limit 1)

            STATUS=$(echo "$RUN_JSON" | jq -r '.[0].status // empty')
            CONCLUSION=$(echo "$RUN_JSON" | jq -r '.[0].conclusion // empty')
            RUN_ID=$(echo "$RUN_JSON" | jq -r '.[0].databaseId // empty')

            if [[ "$STATUS" == "completed" ]]; then
              if [[ "$CONCLUSION" == "success" ]]; then
                echo "CI run $RUN_ID succeeded"
                echo "run-id=$RUN_ID" >> $GITHUB_OUTPUT
                exit 0
              else
                echo "::error::CI run $RUN_ID finished with conclusion: $CONCLUSION"
                exit 1
              fi
            fi

            echo "Attempt $i/$MAX_ATTEMPTS: CI status=$STATUS, waiting ${SLEEP_SECONDS}s..."
            sleep "$SLEEP_SECONDS"
          done

          echo "::error::Timed out waiting for CI to complete after $((MAX_ATTEMPTS * SLEEP_SECONDS))s"
          exit 1

      # --- workflow_dispatch: resolve version via commitizen or override ---
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        if: github.event_name == 'workflow_dispatch'
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve dispatch version
        if: github.event_name == 'workflow_dispatch'
        id: dispatch
        uses: commitizen-tools/commitizen-action@338bbd841b75aaee6bf5340e1fa12f6ab58ff9ff # master
        with:
          dry_run: true
          commit: "false"
          push: "false"
          changelog: "false"
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set dispatch version
        if: github.event_name == 'workflow_dispatch'
        id: dispatch-version
        env:
          INPUT_VERSION: ${{ inputs.version }}
          CZ_VERSION: ${{ steps.dispatch.outputs.version }}
        run: |
          if [[ -n "$INPUT_VERSION" ]]; then
            VERSION="$INPUT_VERSION"
          elif [[ -n "$CZ_VERSION" ]]; then
            VERSION="$CZ_VERSION"
          else
            echo "::error::Could not determine version. Provide explicit version or ensure conventional commits exist."
            exit 1
          fi
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "should-release=true" >> $GITHUB_OUTPUT
          echo "Dispatch release: v${VERSION}"

      # --- Merge version outputs from either path ---
      - name: Merge version outputs
        id: final-version
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          TAG="${{ steps.version.outputs.tag || steps.dispatch-version.outputs.tag }}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${{ steps.version.outputs.version || steps.dispatch-version.outputs.version }}" >> $GITHUB_OUTPUT
          echo "should-release=${{ steps.version.outputs.should-release || steps.dispatch-version.outputs.should-release || 'false' }}" >> $GITHUB_OUTPUT
          # For tag push, use the tag as checkout ref for downstream jobs
          if [[ "$EVENT_NAME" == "push" ]]; then
            echo "checkout-ref=${TAG}" >> $GITHUB_OUTPUT
          else
            echo "checkout-ref=" >> $GITHUB_OUTPUT
          fi

      - name: Compute image tag
        if: steps.final-version.outputs.should-release == 'true'
        id: image-tag
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          # For tag push: GITHUB_SHA is the tagged commit (same SHA CI used)
          # For dispatch: use HEAD of the checked-out repo
          if [[ "$EVENT_NAME" == "push" ]]; then
            SHA="${GITHUB_SHA}"
          else
            SHA=$(git rev-parse HEAD)
          fi
          SHORT_SHA="${SHA:0:7}"
          echo "image-tag=sha-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "Image tag: sha-${SHORT_SHA}"

      - name: Set CI run ID
        if: steps.final-version.outputs.should-release == 'true'
        id: ci-run
        env:
          POLL_RUN_ID: ${{ steps.ci-poll.outputs.run-id }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [[ "$EVENT_NAME" == "push" ]]; then
            echo "run-id=$POLL_RUN_ID" >> $GITHUB_OUTPUT
          else
            echo "run-id=" >> $GITHUB_OUTPUT
          fi

  # ============================================================================
  # Setup: Platform Matrix (single source of truth)
  # ============================================================================

  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      platforms: ${{ steps.platforms.outputs.matrix }}
    steps:
      - name: Set platform matrix
        id: platforms
        run: |
          echo 'matrix=[{"platform":"linux/amd64","runner":"ubuntu-24.04"},{"platform":"linux/arm64","runner":"ubuntu-24.04-arm"}]' >> $GITHUB_OUTPUT

  # ============================================================================
  # Docker Release Build: Parallel per-platform builds (fallback)
  # ============================================================================
  # Only runs when there's no CI run to retag from.
  # Mirrors CI's matrix build pattern for parallel per-platform builds.

  docker-release-build:
    name: Docker Build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    needs: [guard, setup]
    if: needs.guard.outputs.should-release == 'true' && needs.guard.outputs.ci-run-id == ''
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.setup.outputs.platforms) }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.guard.outputs.checkout-ref }}
          persist-credentials: false

      - name: Prepare platform vars
        id: platform
        run: |
          platform="${{ matrix.platform }}"
          echo "pair=${platform//\//-}" >> $GITHUB_OUTPUT  # linux/amd64 -> linux-amd64

      - name: Check if QEMU is needed
        id: qemu-check
        run: |
          RUNNER_ARCH="${{ runner.arch }}"
          TARGET="${{ matrix.platform }}"
          NEED_QEMU="true"
          if [[ "$RUNNER_ARCH" == "X64" && "$TARGET" == "linux/amd64" ]] || \
             [[ "$RUNNER_ARCH" == "ARM64" && "$TARGET" == "linux/arm64" ]]; then
            NEED_QEMU="false"
          fi
          echo "needed=$NEED_QEMU" >> $GITHUB_OUTPUT
          echo "Runner: $RUNNER_ARCH, Target: $TARGET, QEMU needed: $NEED_QEMU"

      - uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0
        if: steps.qemu-check.outputs.needed == 'true'

      - uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4 # v6.15.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.guard.outputs.version }}-${{ steps.platform.outputs.pair }}
          cache-from: type=gha,scope=release-${{ steps.platform.outputs.pair }}
          cache-to: type=gha,scope=release-${{ steps.platform.outputs.pair }},mode=max

  # ============================================================================
  # Docker Release Manifest: Retag CI images or merge platform-specific builds
  # ============================================================================
  # If a CI run exists: retags CI-built SHA images to version tags using
  # `docker buildx imagetools create`. This is a manifest-only operation —
  # no rebuild, bit-for-bit identical to what CI tested.
  # If no CI run: merges per-platform builds into a multi-arch manifest.

  docker-release-manifest:
    name: Docker Manifest
    runs-on: ubuntu-latest
    needs: [guard, setup, docker-release-build]
    if: always() && needs.guard.outputs.should-release == 'true' && !contains(needs.*.result, 'failure')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Retag existing CI-tested images (when CI run found)
      - name: Retag CI images to release version
        if: needs.guard.outputs.ci-run-id != ''
        env:
          IMAGE_TAG: ${{ needs.guard.outputs.image-tag }}
          VERSION: ${{ needs.guard.outputs.version }}
        run: |
          echo "Retagging ${IMAGE_TAG} -> ${VERSION} and latest"
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}

      # Fallback: merge platform-specific builds into multi-arch manifest
      - name: Create multi-platform manifest
        if: needs.guard.outputs.ci-run-id == ''
        env:
          VERSION: ${{ needs.guard.outputs.version }}
        run: |
          IMAGES=""
          for platform in $(echo '${{ needs.setup.outputs.platforms }}' | jq -r '.[].platform'); do
            pair="${platform//\//-}"
            IMAGES="$IMAGES ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}-${pair}"
          done
          echo "Merging platform images into ${VERSION} and latest: $IMAGES"
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            $IMAGES

  # ============================================================================
  # Create GitHub Release
  # ============================================================================

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: [guard, docker-release-manifest]
    if: always() && needs.guard.outputs.should-release == 'true' && !contains(needs.*.result, 'failure')
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.guard.outputs.checkout-ref }}
          fetch-depth: 0

          persist-credentials: false

      # Download SBOM from CI run (manifest-level SPDX from docker-merge)
      - name: Download SBOM
        if: needs.guard.outputs.ci-run-id != ''
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          run-id: ${{ needs.guard.outputs.ci-run-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          name: sbom
          path: /tmp/sbom/
        continue-on-error: true

      # Download per-platform security scan artifacts (contain CycloneDX SBOMs)
      - name: Download security scan (linux-amd64)
        if: needs.guard.outputs.ci-run-id != ''
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          run-id: ${{ needs.guard.outputs.ci-run-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          name: security-scan-linux-amd64
          path: /tmp/security-scan-amd64/
        continue-on-error: true

      - name: Download security scan (linux-arm64)
        if: needs.guard.outputs.ci-run-id != ''
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          run-id: ${{ needs.guard.outputs.ci-run-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          name: security-scan-linux-arm64
          path: /tmp/security-scan-arm64/
        continue-on-error: true

      # Build versioned install manifest
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Build install manifest
        env:
          VERSION: ${{ needs.guard.outputs.version }}
        run: |
          make build-installer "IMG=${REGISTRY}/${IMAGE_NAME}:${VERSION}"
          mv dist/install.yaml dist/db-provision-operator-${VERSION}.yaml

      # Package CRDs tarball
      - name: Package CRDs
        env:
          VERSION: ${{ needs.guard.outputs.version }}
        run: |
          mkdir -p dist/crds
          cp config/crd/bases/*.yaml dist/crds/
          cd dist && tar -czvf crds-${VERSION}.tar.gz crds/

      # Copy dashboards, install Helm, stamp versions, package chart
      - name: Copy dashboards
        run: make copy-dashboards

      - uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4.3.0
        with:
          version: v3.14.0

      - name: Stamp version in chart
        env:
          VERSION: ${{ needs.guard.outputs.version }}
        run: |
          sed -i "s/^version:.*/version: ${VERSION}/" charts/db-provision-operator/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" charts/db-provision-operator/Chart.yaml
          sed -i "s/tag:.*/tag: \"${VERSION}\"/" charts/db-provision-operator/values.yaml

      - name: Package Helm chart
        run: helm package charts/db-provision-operator -d dist/

      # Generate checksums
      - name: Generate checksums
        run: |
          cd dist
          sha256sum db-provision-operator-*.yaml crds-*.tar.gz *.tgz > checksums.txt

      # Prepare release assets
      - name: Prepare release assets
        env:
          VERSION: ${{ needs.guard.outputs.version }}
        run: |
          mkdir -p release-assets
          cp dist/db-provision-operator-${VERSION}.yaml release-assets/
          cp dist/crds-${VERSION}.tar.gz release-assets/
          cp dist/db-provision-operator-${VERSION}.tgz release-assets/
          cp dist/checksums.txt release-assets/
          [ -f /tmp/sbom/sbom.spdx.json ] && cp /tmp/sbom/sbom.spdx.json release-assets/ || true
          [ -f /tmp/security-scan-amd64/sbom-linux-amd64.cyclonedx.json ] && cp /tmp/security-scan-amd64/sbom-linux-amd64.cyclonedx.json release-assets/ || true
          [ -f /tmp/security-scan-arm64/sbom-linux-arm64.cyclonedx.json ] && cp /tmp/security-scan-arm64/sbom-linux-arm64.cyclonedx.json release-assets/ || true
          echo "Release assets:"
          ls -la release-assets/

      - name: Generate changelog
        env:
          TAG: ${{ needs.guard.outputs.tag }}
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            echo "Generating changelog from $PREV_TAG to $TAG"
            CHANGELOG=$(git log --pretty=format:"- %s" "$PREV_TAG".."$TAG" | head -50)
          else
            echo "No previous tag found, using all commits"
            CHANGELOG=$(git log --pretty=format:"- %s" | head -50)
          fi
          echo "$CHANGELOG" > /tmp/changelog.txt

      - name: Create Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          tag_name: ${{ needs.guard.outputs.tag }}
          name: ${{ needs.guard.outputs.tag }}
          body_path: /tmp/changelog.txt
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(needs.guard.outputs.tag, '-rc') || contains(needs.guard.outputs.tag, '-alpha') || contains(needs.guard.outputs.tag, '-beta') }}
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================================
  # Helm OCI: Push chart to container registry
  # ============================================================================

  helm-oci:
    name: Helm Chart (OCI)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    needs: [guard, docker-release-manifest, github-release]
    if: always() && needs.guard.outputs.should-release == 'true' && !contains(needs.*.result, 'failure')
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.guard.outputs.checkout-ref }}
          persist-credentials: false

      - uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4.3.0
        with:
          version: v3.14.0

      - name: Copy dashboards
        run: make copy-dashboards

      - name: Stamp version in chart
        env:
          VERSION: ${{ needs.guard.outputs.version }}
        run: |
          sed -i "s/^version:.*/version: ${VERSION}/" charts/db-provision-operator/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" charts/db-provision-operator/Chart.yaml
          sed -i "s/tag:.*/tag: \"${VERSION}\"/" charts/db-provision-operator/values.yaml

      - name: Login to GHCR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
        run: echo "${GITHUB_TOKEN}" | helm registry login ghcr.io --username "${GH_ACTOR}" --password-stdin

      - name: Package and push Helm chart
        env:
          VERSION: ${{ needs.guard.outputs.version }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          helm package charts/db-provision-operator
          helm push "db-provision-operator-${VERSION}.tgz" "oci://ghcr.io/${REPO_OWNER}/charts"

  # ============================================================================
  # Deploy Documentation
  # ============================================================================

  docs-release:
    name: Deploy Documentation
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    needs: [guard, github-release]
    if: needs.guard.outputs.should-release == 'true'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.guard.outputs.checkout-ref }}
          fetch-depth: 0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: docs/requirements.txt

      - name: Install dependencies
        run: pip install -r docs/requirements.txt

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force

  # ============================================================================
  # Summary
  # ============================================================================

  release-summary:
    name: Release Summary
    runs-on: ubuntu-latest
    permissions: {}
    needs: [guard, docker-release-manifest, github-release, helm-oci, docs-release]
    if: always() && needs.guard.outputs.should-release == 'true'
    env:
      VERSION: ${{ needs.guard.outputs.version }}
      TAG: ${{ needs.guard.outputs.tag }}
    steps:
      - name: Summary
        env:
          DOCKER_RESULT: ${{ needs.docker-release-manifest.result }}
          RELEASE_RESULT: ${{ needs.github-release.result }}
          HELM_RESULT: ${{ needs.helm-oci.result }}
          DOCS_RESULT: ${{ needs.docs-release.result }}
          REPO: ${{ github.repository }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          echo "## Release $TAG" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Release | $DOCKER_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "| GitHub Release | $RELEASE_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "| Helm OCI | $HELM_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "| Documentation | $DOCS_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact | Location |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Image | \`ghcr.io/${REPO}:${VERSION}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Helm Chart | \`helm install db-provision-operator oci://ghcr.io/${REPO_OWNER}/charts/db-provision-operator --version ${VERSION}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Documentation | https://${REPO_OWNER}.github.io/db-provision-operator/ |" >> $GITHUB_STEP_SUMMARY
          echo "| GitHub Release | https://github.com/${REPO}/releases/tag/${TAG} |" >> $GITHUB_STEP_SUMMARY
